<!DOCTYPE html>
<html lang = "en">
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel = "stylesheet" href = "style.css">
</head>
<body>
    <div class = "game-container">
        <h1> Tic-Tac-Toe </h1>
        <div id = "status"> Player X's turn </div>
        <div id = "gameModeSelector">
            <button class = "gameMode" data-index = "0"> Human vs Human </button>
            <button class = "gameMode" data-index = "1"> Human vs AI </button>
        </div>
        <div id = "characterSelector">
            <button class = "character" data-index = "0"> O/X </button>
            <button class = "character" data-index = "1"> T/Y </button>
            <button class = "character" data-index = "2"> 🐱/🐶 </button>
        </div>
        
        
        
        <div class = "board">
            <div class = "cell" data-index = "0"></div>
            <div class = "cell" data-index = "1"></div>
            <div class = "cell" data-index = "2"></div>
            <div class = "cell" data-index = "3"></div>
            <div class = "cell" data-index = "4"></div>
            <div class = "cell" data-index = "5"></div>
            <div class = "cell" data-index = "6"></div>
            <div class = "cell" data-index = "7"></div>
            <div class = "cell" data-index = "8"></div>
        </div>
            <button id = "restart"> Restart Game </button>
        </div>

        <script src = "script.js"></script>
</body>
</html>
